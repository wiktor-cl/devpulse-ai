spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: test-secret-key-for-unit-tests-only-minimum-32-chars-long
    expiration: 3600000
    refresh-expiration: 86400000
  openai:
    api-key: sk-test
    model: gpt-4o-mini
    max-tokens: 100
  cors:
    allowed-origins: http://localhost:5173
