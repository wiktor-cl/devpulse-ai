version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: devpulse-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-devpulse}
      POSTGRES_USER: ${DB_USERNAME:-devpulse}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpulse123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-devpulse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devpulse-network

  redis:
    image: redis:7-alpine
    container_name: devpulse-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - devpulse-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devpulse-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-devpulse}
      DB_USERNAME: ${DB_USERNAME:-devpulse}
      DB_PASSWORD: ${DB_PASSWORD:-devpulse123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-devpulse-super-secret-key-change-in-production-256bits}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:80}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devpulse-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
    container_name: devpulse-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - devpulse-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  devpulse-network:
    driver: bridge
